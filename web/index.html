<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphiti - 知識圖譜管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
    <!-- 頂部導航 -->
    <nav class="navbar" aria-label="主導航">
        <div class="navbar-brand">
            <span class="brand-icon" aria-hidden="true">&#9670;</span>
            <span class="brand-text">Graphiti</span>
        </div>
        <button class="navbar-hamburger" onclick="App.toggleMenu()" aria-label="展開選單">&#9776;</button>
        <div class="navbar-links" role="navigation" aria-label="頁面導航">
            <a href="#/" class="nav-link active" data-page="dashboard" aria-current="page">儀表板</a>
            <a href="#/nodes" class="nav-link" data-page="nodes">實體節點</a>
            <a href="#/facts" class="nav-link" data-page="facts">事實關係</a>
            <a href="#/episodes" class="nav-link" data-page="episodes">記憶片段</a>
            <a href="#/overview" class="nav-link" data-page="overview">知識總覽</a>
            <a href="#/timeline" class="nav-link" data-page="timeline">時間線</a>
            <a href="#/communities" class="nav-link" data-page="communities">社群</a>
            <a href="#/graph" class="nav-link" data-page="graph">圖譜</a>
            <a href="#/ask" class="nav-link" data-page="ask">知識問答</a>
        </div>
        <div class="navbar-actions">
            <div id="group-filter-container" aria-label="篩選群組"></div>
            <button id="delete-group-btn" class="btn-icon btn-danger-icon" aria-label="刪除選中群組"
                    title="刪除選中群組" style="display:none" onclick="App.deleteGroup()">&#10005;</button>
            <button id="theme-toggle" class="btn-icon" aria-label="切換深色/淺色主題">
                <span class="theme-icon-dark" aria-hidden="true">&#9790;</span>
                <span class="theme-icon-light" aria-hidden="true">&#9728;</span>
            </button>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main id="app" class="main-content" role="main" aria-live="polite">
        <div class="loading-spinner" role="status">載入中...</div>
    </main>

    <!-- 刪除確認 Dialog -->
    <dialog id="confirm-dialog" class="confirm-dialog" aria-labelledby="dialog-title" aria-describedby="confirm-message">
        <div class="dialog-content">
            <h3 id="dialog-title" class="dialog-title">確認刪除</h3>
            <p id="confirm-message" class="dialog-message"></p>
            <div class="dialog-actions">
                <button id="confirm-cancel" class="btn btn-secondary">取消</button>
                <button id="confirm-ok" class="btn btn-danger">刪除</button>
            </div>
        </div>
    </dialog>

    <!-- 新增記憶 Dialog -->
    <dialog id="add-memory-dialog" class="add-memory-dialog" aria-labelledby="add-memory-title">
        <div class="dialog-content">
            <h3 id="add-memory-title" class="dialog-title">新增記憶</h3>
            <form id="add-memory-form" class="memory-form">
                <div class="form-group">
                    <label for="memory-template">快速範本</label>
                    <select id="memory-template" onchange="App.applyTemplate()">
                        <option value="">自訂...</option>
                        <option value="decision">專案決策</option>
                        <option value="preference">技術偏好</option>
                        <option value="person">人員角色</option>
                        <option value="process">流程步驟</option>
                        <option value="bug">Bug 記錄</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="memory-name">名稱 *</label>
                    <input type="text" id="memory-name" required placeholder="記憶片段名稱">
                </div>
                <div class="form-group">
                    <label for="memory-content">內容 *</label>
                    <textarea id="memory-content" required rows="5" placeholder="記憶內容..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="memory-group">群組</label>
                        <input type="text" id="memory-group" placeholder="group_id（留空使用 default）">
                    </div>
                    <div class="form-group">
                        <label for="memory-source">類型</label>
                        <select id="memory-source">
                            <option value="text">文字</option>
                            <option value="json">JSON</option>
                            <option value="message">訊息</option>
                        </select>
                    </div>
                </div>
                <div class="dialog-actions">
                    <button type="button" class="btn btn-secondary" onclick="App.closeAddMemory()">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </dialog>

    <!-- 新增三元組 Dialog -->
    <dialog id="add-triplet-dialog" class="add-memory-dialog" aria-labelledby="add-triplet-title">
        <div class="dialog-content">
            <h3 id="add-triplet-title" class="dialog-title">新增三元組</h3>
            <form id="add-triplet-form" class="memory-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="triplet-source">來源實體 *</label>
                        <input type="text" id="triplet-source" required placeholder="例如: Alice">
                    </div>
                    <div class="form-group">
                        <label for="triplet-relation">關係 *</label>
                        <input type="text" id="triplet-relation" required placeholder="例如: works_at">
                    </div>
                    <div class="form-group">
                        <label for="triplet-target">目標實體 *</label>
                        <input type="text" id="triplet-target" required placeholder="例如: Google">
                    </div>
                </div>
                <div class="form-group">
                    <label for="triplet-fact">事實描述 *</label>
                    <input type="text" id="triplet-fact" required placeholder="例如: Alice works at Google">
                </div>
                <div class="form-group">
                    <label for="triplet-group">群組</label>
                    <input type="text" id="triplet-group" placeholder="group_id（留空使用 default）">
                </div>
                <div class="dialog-actions">
                    <button type="button" class="btn btn-secondary" onclick="App.closeTripletDialog()">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </dialog>

    <!-- Toast 通知 -->
    <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
